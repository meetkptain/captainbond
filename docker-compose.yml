version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: koze-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mot_de_passe_local_1234
      POSTGRES_DB: koze
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
